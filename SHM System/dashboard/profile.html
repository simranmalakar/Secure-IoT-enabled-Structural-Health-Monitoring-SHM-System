<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>User Profile — SHM Monitor</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
    <style>
        .profile-container {
            max-width: 800px;
            margin: 40px auto;
            padding: 0 20px;
        }
        .profile-header {
            display: flex;
            align-items: center;
            gap: 24px;
            margin-bottom: 32px;
            background: var(--bg-card);
            padding: 32px;
            border-radius: 20px;
            border: 1px solid var(--border);
            backdrop-filter: blur(10px);
        }
        .profile-avatar-large {
            width: 100px;
            height: 100px;
            background: linear-gradient(135deg, var(--accent), var(--cyan));
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2.5rem;
            font-weight: 800;
            color: white;
            box-shadow: 0 10px 30px rgba(99, 102, 241, 0.3);
        }
        .profile-title h1 {
            font-size: 1.8rem;
            margin-bottom: 4px;
        }
        .profile-title p {
            color: var(--text-secondary);
            font-family: var(--mono);
            font-size: 0.9rem;
        }
        .profile-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 24px;
        }
        .profile-section {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 20px;
            padding: 24px;
        }
        .profile-section h3 {
            font-size: 1.1rem;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .info-row {
            margin-bottom: 16px;
        }
        .info-row label {
            display: block;
            font-size: 0.75rem;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 0.05em;
            margin-bottom: 4px;
        }
        .info-row .value {
            font-size: 1rem;
            color: var(--text-primary);
            font-weight: 500;
        }
    </style>
</head>
<body>
    <nav class="navbar">
        <div class="nav-left">
            <a href="index.html" class="nav-logo">
                <svg width="28" height="28" viewBox="0 0 48 48" fill="none">
                    <rect x="4" y="20" width="40" height="4" rx="2" fill="url(#ng1)"/>
                    <rect x="8" y="24" width="4" height="16" rx="2" fill="url(#ng1)"/>
                    <rect x="20" y="24" width="4" height="20" rx="2" fill="url(#ng1)"/>
                    <rect x="36" y="24" width="4" height="16" rx="2" fill="url(#ng1)"/>
                    <circle cx="24" cy="12" r="6" stroke="url(#ng2)" stroke-width="2.5" fill="none"/>
                    <circle cx="24" cy="12" r="2" fill="url(#ng2)"/>
                    <defs>
                        <linearGradient id="ng1" x1="0" y1="0" x2="48" y2="48"><stop stop-color="#6366f1"/><stop offset="1" stop-color="#06b6d4"/></linearGradient>
                        <linearGradient id="ng2" x1="18" y1="6" x2="30" y2="18"><stop stop-color="#f59e0b"/><stop offset="1" stop-color="#ef4444"/></linearGradient>
                    </defs>
                </svg>
                <span>SHM Monitor</span>
            </a>
        </div>
        <div class="nav-right">
            <button class="header-btn" onclick="window.location.href='index.html'" title="Back to Dashboard">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 9l9-7 9 7v11a2 2 0 01-2 2H5a2 2 0 01-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
            </button>
            <button class="header-btn" id="logout-btn" title="Logout">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 21H5a2 2 0 01-2-2V5a2 2 0 012-2h4"/><polyline points="16,17 21,12 16,7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
            </button>
        </div>
    </nav>

    <main class="profile-container">
        <div class="profile-header">
            <div class="profile-avatar-large" id="prof-avatar">A</div>
            <div class="profile-title">
                <h1 id="prof-name">Admin User</h1>
                <p id="prof-role">System Administrator</p>
            </div>
        </div>

        <div class="profile-grid">
            <div class="profile-section">
                <h3><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg> Account Information</h3>
                <div class="info-row">
                    <label>Username</label>
                    <div class="value" id="val-username">admin</div>
                </div>
                <div class="info-row">
                    <label>Assigned Role</label>
                    <div class="value" id="val-role">Administrator</div>
                </div>
                <div class="info-row">
                    <label>Account Status</label>
                    <div class="value"><span class="status-pill active">Verified</span></div>
                </div>
            </div>

            <div class="profile-section">
                <h3><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg> Security Settings</h3>
                <form id="password-form">
                    <div class="input-group">
                        <label>New Password</label>
                        <input type="password" id="new-password" placeholder="Enter new password">
                    </div>
                    <button type="submit" class="btn-primary" style="margin-top: 8px;">Update Security</button>
                </form>
            </div>
        </div>
    </main>

    <div id="toast-container" style="position:fixed; top:20px; right:20px; z-index:10000; display:flex; flex-direction:column; gap:10px;"></div>

    <script src="js/app.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const user = sessionStorage.getItem('shm_user');
            const role = sessionStorage.getItem('shm_role');
            
            if (!user) {
                window.location.href = 'index.html';
                return;
            }

            document.getElementById('prof-name').textContent = user;
            document.getElementById('prof-avatar').textContent = user.charAt(0).toUpperCase();
            document.getElementById('prof-role').textContent = role || 'System User';
            
            document.getElementById('val-username').textContent = user;
            document.getElementById('val-role').textContent = role || 'User';

            // Handle Password Change Mock
            document.getElementById('password-form').addEventListener('submit', (e) => {
                e.preventDefault();
                const pass = document.getElementById('new-password').value;
                if (!pass) return;
                
                showFeedback("Security settings updated successfully.", "success");
                document.getElementById('new-password').value = "";
            });
        });
    </script>
</body>
</html>
