# =====================================================
# Mosquitto Broker Configuration — Secure IoT SHM
# =====================================================
# This config enables TLS-encrypted MQTT on port 8883
# and a plain listener on 1883 (for development only).

# --- Listeners ---
# Plain MQTT (development / fallback)
listener 1883
allow_anonymous true

# TLS-secured MQTT
listener 8883
cafile ../certs/ca.crt
certfile ../certs/server.crt
keyfile ../certs/server.key
require_certificate false
allow_anonymous true
tls_version tlsv1.2

# --- Logging ---
log_dest stdout
log_type all
connection_messages true
log_timestamp true

# --- Persistence ---
persistence true
persistence_location ./data/
